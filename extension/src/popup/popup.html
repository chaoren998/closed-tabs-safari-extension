<!doctype html>
<html lang="zh-CN">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>最近关闭</title>
    <link rel="stylesheet" href="./popup.css">
  </head>
  <body>
    <main class="popup-shell">
      <header class="popup-header">
        <h1>最近关闭</h1>
        <p>从列表中重新打开已关闭标签页</p>

    </main>
    <script type="module" src="./popup.js"></script>
  </body>
